<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title> Add new Job</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">
    <h2>
        Create new Task
    </h2>
    <form th:action="@{/admin/add-job-save}" th:object="${job}" method="POST">
        <div class="mb-3">
            <label class="form-label">
                Title
            </label>
            <input type="text" th:field="*{title}" class="label" required>
        </div>
        <div class="mb-3">
            <label class="form-label">
                Description
            </label>
            <textarea th:field="*{description}" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">
                Priority(1-10)
            </label>
            <input type="number" th:field="*{priority}" class="form-control" min="1" max="10" required>
        </div>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</body>

</html>
