<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">🚀 TaskManager MVP</a>
            <div class="navbar-nav">
                <a class="nav-link" th:href="@{/admin/dashboard}">Admin Panel</a>
                <a class="nav-link" th:href="@{/user/dashboard}">User View</a>
            </div>
        </div>
    </nav>
    <title>User Dashboard - Task View</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Task Status (View Only)</h2>
        <span class="badge bg-info text-dark">User Mode</span>
    </div>
    <form th:action="@{/logout}" method="post">
        <button type="submit"
            style="background-color: #ff4d4d; color: white; border: none; padding: 10px; cursor: pointer;">
            Logout
        </button>
    </form>
    <form th:action="@{/user/dashboard}" method="get" class="mb-4 d-flex gap-2">
        <input type="text" name="search" class="form-control w-25" placeholder="Search by task title...">
        <button type="submit" class="btn btn-outline-primary">Search</button>
        <a th:href="@{/user/dashboard}" class="btn btn-outline-secondary">Reset</a>
    </form>

    <table class="table table-hover table-bordered shadow-sm">
        <thead class="table-secondary">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Priority</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="job : ${jobs}">
                <td th:text="${job.id}"></td>
                <td th:text="${job.title}"></td>
                <td th:text="${job.description}"></td>
                <td>
                    <span class="badge rounded-pill" th:classappend="${job.priority <= 3} ? 'bg-danger' : 'bg-primary'"
                        th:text="${job.priority}">
                    </span>
                </td>
                <td>
                    <span class="badge"
                        th:classappend="${job.status.name() == 'RUNNING' || job.status.name() == 'IN_PROGRESS'} ? 'bg-info text-dark' : 'bg-secondary'"
                        th:text="${job.status}">
                    </span>
                </td>
            </tr>
        </tbody>
    </table>

    <div th:if="${#lists.isEmpty(jobs)}" class="alert alert-warning text-center">
        No tasks found matching your search.
    </div>
</body>

</html>
