<!DOCTYPE html>
<html>

<head>
    <title>Welcome - Task Scheduler</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container text-center mt-5">
        <h1 class="display-4 mb-4">Welcome to Task Scheduling System</h1>
        <p class="lead mb-5">Select your role to continue</p>
        <div class="row justify-content-center gap-4">
            <div class="col-md-4 card p-4 shadow-sm">
                <h3>Admin</h3>
                <p>Add, process, and manage all tasks.</p>
                <a href="/admin/dashboard" class="btn btn-primary">Go to Admin Panel</a>
            </div>
            <div class="col-md-4 card p-4 shadow-sm">
                <h3>User</h3>
                <p>View current task status and search.</p>
                <a href="/user/dashboard" class="btn btn-success">Go to User Dashboard</a>
            </div>
        </div>
    </div>
</body>

</html>
